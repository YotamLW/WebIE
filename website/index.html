<!DOCTYPE html>

<head>
    <title>WebIE</title>
    <link rel="icon" type="image/x-icon" sizes="16x16" href="favicon.ico?v=1">
</head>

<body>
    <canvas id="screen"></canvas>
    <script src="./macros.js"></script>
    <script src="./user.js"></script>
    <script src="./mathjax/macros.js"></script>
    <script src="./mathjax/tex-chtml.js"></script>
    <div id="pageContent" z-index="1"><p></p></div>
</body>

<script>

let page = document.getElementById("pageContent")
let historyStack = []

loadPage("main")

async function loadPage (path, history = true) {
    let file = await fetch(`./pages/${path}.txt`)
    page.innerHTML = await file.text()
    MathJax.typesetPromise()
    if (history) {historyStack.push(path)}
}

window.addEventListener("popstate", (event) => {
    console.log("e")
    if (historyStack/length > 1) {
        event.preventDefault()
        historyStack.pop()
        loadPage(historyStack.pop())
    }
})

</script>
